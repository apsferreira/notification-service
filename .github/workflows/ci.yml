# =============================================================================
# Notification Service — CI/CD Pipeline
# GitHub Actions + GHCR + ArgoCD GitOps
#
# Flow:
#   push main    → build + push :sha-{hash} + :latest → update deploy/k8s/ → ArgoCD sync
#   push develop → build + push :staging → ArgoCD sync (staging)
#   pull_request → build + test only (no push)
# =============================================================================

name: CI/CD — Notification Service

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/apsferreira/notification-service

jobs:
  # ---------------------------------------------------------------------------
  # CI: Build and Test
  # ---------------------------------------------------------------------------
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Setup Go 1.24
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: go.sum

      - name: Resolve dependencies
        run: go mod tidy

      - name: Run tests
        run: go test ./... -v -cover

      - name: Setup Buildx
        if: github.event_name == 'push'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push (prod — main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push (staging — develop)
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # CD: Update K8s manifests (GitOps — main)
  # ---------------------------------------------------------------------------
  update-manifests:
    name: Update K8s Manifests (prod)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Update image tag
        run: |
          sed -i "s|${{ env.IMAGE_NAME }}:.*|${{ env.IMAGE_NAME }}:sha-${{ steps.sha.outputs.short }}|g" \
            deploy/k8s/deployment.yaml

      - name: Commit and Push updated manifests
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add deploy/k8s/deployment.yaml
          git diff --staged --quiet || git commit -m "chore(k8s): update image to sha-${{ steps.sha.outputs.short }} [skip ci]"
          git pull --rebase origin main
          git push
