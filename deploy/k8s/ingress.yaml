# =============================================================================
# IngressRoute — Notification Service
# Traefik v3 + Cloudflare Tunnel
#
# Arquitetura de exposição:
#   notification.institutoitinerante.com.br       → Frontend Dashboard (React)
#   notification.institutoitinerante.com.br/api   → Backend API (Go/Fiber)
# =============================================================================

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: notification-service
  namespace: production
  labels:
    app: notification-service
    part-of: apsferreira
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - match: Host(`notification.institutoitinerante.com.br`) && PathPrefix(`/api`)
      kind: Rule
      services:
        - name: notification-service
          port: 80
    - match: Host(`notification.institutoitinerante.com.br`)
      kind: Rule
      services:
        - name: notification-service-frontend
          port: 80
