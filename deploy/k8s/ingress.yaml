apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: notification-service-ingress
  namespace: production
  labels:
    app: notification-service
    part-of: apsferreira
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - notification-api.institutoitinerante.com.br
    secretName: notification-api-tls
  rules:
  - host: notification-api.institutoitinerante.com.br
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: notification-service
            port:
              name: http
